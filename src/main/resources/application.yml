server:
  port: 9000

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gaiadb
    username: gaia
    password: gaia
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none         # Flyway로 스키마 관리, Hibernate 검증 비활성화
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true
        jdbc.fetch_size: 50
        query.in_clause_parameter_padding: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # public 에 pgcrypto extension(함수들) 때문에 "non-empty" 로 인식 — baseline 자동 생성
    baseline-version: 0         # baseline 을 V0 으로 → V1 부터 정상 적용 (기본값 1 이면 V1 을 건너뜀)
#    clean-disabled: false

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
